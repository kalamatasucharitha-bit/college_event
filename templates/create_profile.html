{% extends "base.html" %}

{% block content %}
<div class="registration-wrapper">
  <div class="registration-header">
    <h1>Create Your <em>Profile</em></h1>
    <p>Fill in your details once — they'll be saved for all future event registrations!</p>
  </div>

  <div class="dashboard-grid" style="grid-template-columns: 1fr; max-width: 550px; margin: 0 auto;">
    <div class="dashboard-card" style="padding: 40px; border-radius: 24px; box-shadow: var(--shadow-lg); background: linear-gradient(145deg, var(--white) 0%, #faf8f5 100%); border: 1px solid var(--green-pale);">
      
      <div style="text-align: center; margin-bottom: 24px;">
        <div style="display: inline-flex; align-items: center; justify-content: center; width: 60px; height: 60px; background: rgba(90, 122, 94, 0.1); border-radius: 50%; color: var(--green-dark); font-size: 24px; margin-bottom: 16px;">
          👤
        </div>
        <h3 style="font-family: 'Cormorant Garamond', serif; font-size: 28px; color: var(--green-dark); margin-bottom: 6px;">Participant Details</h3>
        <p style="font-size: 14px; color: var(--text-light);">Securely save your information for quick event registrations.</p>
      </div>

      {% if error %}<div class="error-box" style="margin-bottom:20px; background: rgba(220,80,80,0.05); border: 1px solid rgba(220,80,80,0.2); border-radius: 12px; padding: 12px; text-align: center;">⚠️ {{ error }}</div>{% endif %}
      
      <form method="POST" action="/registration" style="display: flex; flex-direction: column; gap: 16px;">
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
          <div>
            <label style="display: block; font-size: 12px; font-weight: 600; color: var(--green-dark); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">Full Name</label>
            <input type="text" name="name" placeholder="John Doe" required style="width: 100%; padding: 12px 16px; border: 1.5px solid var(--green-pale); border-radius: 12px; background: var(--white); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: all 0.3s ease;">
          </div>
          <div>
            <label style="display: block; font-size: 12px; font-weight: 600; color: var(--green-dark); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">Roll Number</label>
            <input type="text" name="roll_no" placeholder="e.g. CB.EN.U4..." required style="width: 100%; padding: 12px 16px; border: 1.5px solid var(--green-pale); border-radius: 12px; background: var(--white); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: all 0.3s ease;">
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
          <div>
            <label style="display: block; font-size: 12px; font-weight: 600; color: var(--green-dark); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">Department</label>
            <input type="text" name="department" placeholder="e.g. Engineering" required style="width: 100%; padding: 12px 16px; border: 1.5px solid var(--green-pale); border-radius: 12px; background: var(--white); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: all 0.3s ease;">
          </div>
          <div>
            <label style="display: block; font-size: 12px; font-weight: 600; color: var(--green-dark); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">Branch</label>
            <input type="text" name="branch" placeholder="e.g. CSE" required style="width: 100%; padding: 12px 16px; border: 1.5px solid var(--green-pale); border-radius: 12px; background: var(--white); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: all 0.3s ease;">
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
          <div>
            <label style="display: block; font-size: 12px; font-weight: 600; color: var(--green-dark); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">Year</label>
            <select name="year" required style="width: 100%; padding: 12px 16px; border: 1.5px solid var(--green-pale); border-radius: 12px; background: var(--white); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: all 0.3s ease; appearance: none; cursor: pointer;">
              <option value="" disabled selected>Select Year</option>
              <option value="1">1st Year</option>
              <option value="2">2nd Year</option>
              <option value="3">3rd Year</option>
              <option value="4">4th Year</option>
            </select>
          </div>
          <div>
            <label style="display: block; font-size: 12px; font-weight: 600; color: var(--green-dark); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">Contact Number</label>
            <input type="text" name="phone" placeholder="+91 XXXXX XXXXX" required style="width: 100%; padding: 12px 16px; border: 1.5px solid var(--green-pale); border-radius: 12px; background: var(--white); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: all 0.3s ease;">
          </div>
        </div>

        <div>
          <label style="display: block; font-size: 12px; font-weight: 600; color: var(--green-dark); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">Email ID</label>
          <input type="email" name="email" placeholder="student@amrita.edu" required style="width: 100%; padding: 12px 16px; border: 1.5px solid var(--green-pale); border-radius: 12px; background: var(--white); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: all 0.3s ease;">
        </div>
        
        <div style="margin-top: 16px;">
          <button type="submit" style="width: 100%; padding: 16px; background: var(--green-dark); color: var(--white); border: none; border-radius: 12px; font-size: 16px; font-weight: 600; letter-spacing: 0.5px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(58, 90, 62, 0.25);">
            Save Profile & Continue →
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
